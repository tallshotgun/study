<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Student Registration Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 60px;
  }
  h2 {
    text-align: center;
  }
  form {
    max-width: 500px;
    background: white;
    margin: 0 auto;
    padding: 30px;
    border: solid;
  }
  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }
  input[type="text"], select {
    width: 100%;
    padding: 8px;
    margin-bottom: 16px;
    border: solid;
  }
  .radio-group, .checkbox-group {
    margin-bottom: 16px;
  }
  .radio-group label, .checkbox-group label {
    font-weight: normal;
    display: inline-block;
    margin-right: 16px;
    cursor: pointer;
  }
  input[type="radio"], input[type="checkbox"] {
    margin-right: 6px;
    cursor: pointer;
  }
  .buttons {
    text-align: center;
  }
  input[type="submit"], input[type="reset"] {
    font-weight: bold;
    background-color: black;
    color: white;
    border: none;
    padding: 10px 24px;
    margin: 10px 10px 0 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
</style>
</head>
<body>

<h2>Student Registration Form</h2>

<form>
  <label for="name">Full Name:</label>
  <input type="text" id="name" name="fullname" placeholder="Enter your full name" required />

  <label for="course">Select Course:</label>
  <select id="course" name="course" required>
    <option value="">--Choose a course--</option>
    <option value="bca">BCA</option>
    <option value="bsc">BSc</option>
    <option value="mba">MBA</option>
  </select>

  <label for="semester">Select Semester:</label>
  <select id="semester" name="semester" required>
    <option value="">--Choose semester--</option>
    <option value="1">1st Semester</option>
    <option value="2">2nd Semester</option>
    <option value="3">3rd Semester</option>
  </select>

  <div class="radio-group">
    <label>Gender:</label>
    <label><input type="radio" name="gender" value="male" required /> Male</label>
    <label><input type="radio" name="gender" value="female" /> Female</label>
    <label><input type="radio" name="gender" value="other" /> Other</label>
  </div>

  <div class="checkbox-group">
    <label>Interests:</label>
    <label><input type="checkbox" name="interest" value="sports" /> Sports</label>
    <label><input type="checkbox" name="interest" value="music" /> Music</label>
    <label><input type="checkbox" name="interest" value="reading" /> Reading</label>
  </div>

  <div class="buttons">
    <input type="submit" value="Submit" />
    <input type="reset" value="Reset" />
  </div>
</form>

</body>
</html>
